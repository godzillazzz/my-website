<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบออนไลน์ระดับพรีเมียม (Random Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-color: #00c4cc;
            --success-color: #28a745;
            --danger-color: #ff4d4d;
            --bg-color: #f0f2f5;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #e0e0ff 0%, #f0f2f5 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.95);
            width: 95%;
            max-width: 550px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        #progress-bar {
            height: 100%;
            background: var(--primary-gradient);
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        h2 { 
            font-weight: 600;
            margin-top: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .question { 
            font-size: 1.3rem; 
            margin-bottom: 25px; 
            line-height: 1.5;
        }

        .options { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        button {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Kanit';
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
        }

        button:hover {
            border-color: #764ba2;
            background: #f8faff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.1);
        }

        button.selected {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn-back { 
            border: none;
            background: #f0f0f0; 
            color: #666; 
            flex: 1; 
            text-align: center !important;
        }

        .btn-next {
            background: var(--primary-gradient);
            color: white;
            border: none;
            flex: 1;
            text-align: center !important;
            font-weight: 500;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: 'Kanit';
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #764ba2; }

        .hidden { display: none !important; }

        .btn-submit {
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 100%;
            font-weight: 600;
            text-align: center !important;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .fade-in { animation: slideIn 0.4s ease-out; }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 20px auto;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="progress-wrapper">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="closed-step" class="hidden">
        <h2 style="background: none; -webkit-text-fill-color: var(--danger-color);">❌ ปิดรับคำตอบแล้ว</h2>
        <p id="closed-detail" style="font-size: 1.1rem;"></p>
    </div>

    <div id="quiz-content">
        <div id="quiz-step" class="fade-in">
            <h2 id="q-title">คำถาม</h2>
            <div class="question" id="q-text">กำลังโหลดคำถาม...</div>
            <div class="options" id="q-options"></div>
            
            <div class="nav-buttons">
                <button id="prev-btn" class="btn-back hidden" onclick="prevQuestion()">← ย้อนกลับ</button>
                <button id="next-btn" class="btn-next" onclick="nextQuestion()">ถัดไป →</button>
            </div>
        </div>

        <div id="result-step" class="hidden fade-in">
            <h2 id="result-header">ผลการทดสอบ</h2>
            <div class="score-circle" id="score-display">0%</div>
            <p id="score-text" style="font-size: 1.2rem; font-weight: 500;"></p>
            
            <div id="pass-form" class="hidden">
                <div style="background: #e8f5e9; padding: 15px; border-radius: 12px; margin-bottom: 20px; color: #2e7d32;">
                    🎉 ยินดีด้วยคุณสอบผ่าน! กรุณากรอกข้อมูลเพื่อรับเกียรติบัตร
                </div>
                <input type="text" id="user-name" placeholder="ชื่อ-นามสกุล (สำหรับพิมพ์บนเกียรติบัตร)" required>
                <input type="email" id="user-email" placeholder="อีเมลสำหรับจัดส่ง" required>
                <button class="btn-submit" onclick="sendData()">รับเกียรติบัตรทางอีเมล</button>
            </div>

            <div id="fail-msg" class="hidden">
                <p style="color: #666;">คะแนนของคุณยังไม่ถึงเกณฑ์ 70% <br>พยายามอีกนิดนะครับ!</p>
                <button class="btn-submit" onclick="location.reload()">ลองใหม่อีกครั้ง</button>
            </div>
        </div>
    </div>
</div>

<script>
    const DEADLINE_DATE = "2027-12-31"; 
    const DEADLINE_TIME = "16:30";      

    const API_URL = 'https://script.google.com/macros/s/AKfycbxWXTALSodZnCC0EceZNX7o5P3xb4RQdXM3mcDgeUlZU7KBRx0fO-TRPGouP0RgebC6/exec';
    
    // ข้อมูลดิบ
    const rawData = [
        { q: "คุณเพิ่งเข้าทำงานวันแรกในโรงงาน หัวหน้าได้มอบหมายให้คุณทำงานเกี่ยวกับเครื่องจักร ซึ่งมีลักษณะคล้ายๆกับที่คุณเคยทำมาก่อน (สถานที่ทำงานเก่า) แต่คุณไม่แน่ใจว่าจะทำงานกับเครื่องจักรนั้นได้ หัวหน้างานเข้าใจว่าคุณมีประสบการณ์มากกว่าทีคุณมีจริงๆ ดังนั้นเขาจึงสั่งให้คุณเริ่มทำงานให้ดีที่สุดเท่าทีจะทำได้ แล้วเขาก็เดินจากไป คุณจะทำอย่างไร", a: ["เปิดสวิทซ์เริ่มเดินเครื่องจักร เพราะคุณทราบดีว่าคุณจะต้องคุ้นเคยกับเครื่องจักรตัวใหม่นี้ภายในไม่ช้า", "เรียกหัวหน้างานกลับมา และบอกเขาว่า คุณยังไม่ทราบวิธีการทำงานกับเครื่องจักรที่กำลังได้รับมอบหมายให้ทำ", "มองคนข้างๆที่ทำงานกับเครื่องจักรซึ่งมีลักษณะคล้ายกับเครื่องจักรของคุณแล้วพยายามทำตามเขา", "เดินตรวจสอบเครื่องจักรสังเกตปุ่มและสัญลักษณ์ และสุ่มกดไปเรื่อยๆว่าปุ่มไหน สัญลักษณ์ไหนคืออะไร"], correct: "เรียกหัวหน้างานกลับมา และบอกเขาว่า คุณยังไม่ทราบวิธีการทำงานกับเครื่องจักรที่กำลังได้รับมอบหมายให้ทำ" },
        { q: "ตาม พ.ร.บ. ความปลอดภัยฯ พ.ศ. 2554 มาตรา 16 นายจ้างต้องจัดอบรมความปลอดภัยให้ลูกจ้างเมื่อใด ?", a: ["เมื่อลูกจ้างร้องขอเท่านั้น", "ก่อนเริ่มงาน หรือเมื่อเปลี่ยนงาน/เปลี่ยนเครื่องจักร", "หลังจากทำงานครบ 1 ปี", "เฉพาะลูกจ้างที่มีความเสี่ยงสูงเท่านั้น"], correct: "ก่อนเริ่มงาน หรือเมื่อเปลี่ยนงาน/เปลี่ยนเครื่องจักร" },
        { q: "คำว่า 'อุบัติเหตุ' (Accident) ตามนิยามในคู่มือหมายถึงอะไร ? ", a: ["เหตุการณ์ที่วางแผนไว้แล้ว", "เหตุการณ์ที่ไม่มีผู้ใดตั้งใจให้เกิด แต่มีผลเสียต่อชีวิตหรือทรัพย์สิน", "เหตุการณ์ที่เกือบจะเกิดอันตรายแต่ยังไม่เกิด", "การเจ็บป่วยจากการทำงานเป็นเวลานาน"], correct: "เหตุการณ์ที่ไม่มีผู้ใดตั้งใจให้เกิด แต่มีผลเสียต่อชีวิตหรือทรัพย์สิน" },
	{ q: "ข้อใดคือความสูญเสีย 'ทางตรง' จากอุบัติเหตุ ? ", a: ["การสูญเสียเวลาทำงาน", "การเสียชื่อเสียงขององค์กร", "ผลผลิตที่ลดลง", "ค่ารักษาพยาบาลและค่าทำขวัญ"], correct: "ค่ารักษาพยาบาลและค่าทำขวัญ" },
        { q: "อุปกรณ์ใดที่ช่างไฟฟ้าต้องสวมใส่ซ้อนกันเพื่อป้องกันอันตรายจากไฟฟ้า ?", a: ["ถุงมือผ้าซ้อนถุงมือหนัง", "ถุงมือพลาสติกซ้อนถุงมือผ้า", "ไม่ต้องสวมซ้อนกัน", "ถุงมือยางซ้อนถุงมือหนัง"], correct: "ถุงมือยางซ้อนถุงมือหนัง" },
        { q: "อุปกรณ์บันทึกปริมาณรังสีประจำตัวพนักงาน ต้องสวมใส่เมื่อใด", a: ["เฉพาะตอนตรวจร่างกายประจำปี", "ตลอดเวลาที่ปฏิบัติงานเกี่ยวกับรังสี", "เฉพาะเมื่อเกิดเหตุรังสีรั่วไหล", "สวมใส่เฉพาะหลังเลิกงาน"], correct: "ตลอดเวลาที่ปฏิบัติงานเกี่ยวกับรังสี" },
	{ q: "มีชายผู้หนึ่งกำลังคุมเครื่องจักรทำงานอยู่ใกล้ๆคุณ ขณะนั้นชายอีกคนหนึ่งต้องการจะหยอกล้อกับชายผู้นั้น จึงได้เอาหนังสติ๊กเล็งเข้าที่ใบหูของชายผู้ที่กำลังทำงานกับเครื่องจักร คุณจะทำอย่างไร", a: ["ตะโกน 'หยุด' ให้ดังที่สุดเท่าที่จะทำได้", "รีบเดินเข้าไปหาชายคนที่กำลังเล็งหนังสติ๊ก แล้วพยายามบอกให้เขาหยุดการล้อเล่นนั้น ก่อนที่เขาจะยิงหนังสติ๊กออกไป", "รู้สึกสนุกสนานกับการล้อเล่นแบบนี้ เพราะดูแล้วไม่น่าจะมีอันตราย", "รีบวิ่งไปฟ้องหัวหน้าหรือผู้มีอำนาจเหนือตนโดยทันที"], correct: "รีบเดินเข้าไปหาชายคนที่กำลังเล็งหนังสติ๊ก แล้วพยายามบอกให้เขาหยุดการล้อเล่นนั้น ก่อนที่เขาจะยิงหนังสติ๊กออกไป" },
        { q: "ระดับเสียงเฉลี่ยตลอดระยะเวลาการทำงาน 8 ชั่วโมง (TWA) ต้องไม่เกินเท่าใด", a: ["80 dBA", "85 dBA", "90 dBA", "100 dBA"], correct: "85 dBA" },
	{ q: "คุณได้รับมอบหมายให้ขนของกองใหญ่ไปไว้ในห้องเก็บของให้เสร็จภายในเวลาเที่ยง คุณได้เริ่มทำงานตั้งแต่เช้าด้วยดีมาตลอด ขณะที่เหลือเวลาอีก 10 นาที จะถึงเวลารับประทานอาหารเที่ยง ของที่เหลือต้องใช้เวลาอีกประมาณครึ่งชั่วโมงจึงจะขนเสร็จ หันไปรอบๆก็ไม่มีใครช่วยคุณได้ คุณจะทำอย่างไร", a: ["รีบขนของที่เหลือใส่รถบรรทุกเพิ่มมากขึ้นเป็นสองเท่า และทำงานเร็วขึ้นเป็นสองเท่าของการทำงานปกติ", "หยุดขนของตอนเที่ยงตรง ไปรับประทานอาหารแล้วกลับมาทำงานใหม่ ยอมเสี่ยงที่จะถูกหัวหน้างานดุ", "อยู่ทำงานให้เสร็จ โดยยอมไปรับประทานอาหารเที่ยงช้าไปครึ่งชั่วโมง", "ไปตามหาเพื่อน และขอร้องให้มาช่วยงาน ซึ่งไม่รู้ว่าเพื่อนอยู่ที่ไหน"], correct: "หยุดขนของตอนเที่ยงตรง ไปรับประทานอาหารแล้วกลับมาทำงานใหม่ ยอมเสี่ยงที่จะถูกหัวหน้างานดุ" },
	{ q: "ตัวเลข 4 หลักที่ใช้ระบุชนิดของสารอันตรายเพื่อการตอบโต้ฉุกเฉินเรียกว่าระบบใด", a: ["เลขบัตรประชาชน", "UN Number", "ISO Number", "QR Code"], correct: "UN Number" },
	{ q: "คุณกำลังทำงาน วันหนึ่งเห็นประกาศรับสมัครในหนังสือพิมพ์ ซึ่งเป็นงานที่คุณคิดว่าคุณสามารถทำได้และรายได้ก็ดี คุณเคยทราบประวัติไม่ดีของบริษัทฯนี้เกี่ยวกับเรื่องความปลอดภัย โดยทราบว่า คนงาน 2 คน พึ่งได้รับอุบัติเหตุถึงแก่ความตายเมื่อสัปดาห์ที่แล้ว คุณจะทำอย่างไร", a: ["บอกตัวเองว่าเป็นการดีที่จะต้องปลอดภัยไว้ แต่เรื่องเงินเป็นเรื่องใหญ่ ดังนั้นจึงตัดสินใจสมัครเข้าทำงาน", "ให้เหตุผลกับตัวเองว่าบริษัทฯนั้นอาจจะโชคร้ายที่มีอุบัติเหตุเกิดขึ้น ถ้าคุณเข้าทำงานในสถานที่นั้นก็ไม่ได้หมายความว่าตัวเองจะต้องได้รับอุบัติเหตุเสมอไป", "เดินทางไปที่บริษัทนั่น และขอเข้าพบกับ HR พร้อมร้องขอเงินเดือนเพิ่มขึ้นเป็นสองเท่าเพื่อแรงจูงใจในการทำงาน", "ตัดสินใจว่าจะต้องมีเหตุผลอะไรที่นอกเหนือเงินขึ้นไป คุณจึงยอมสมัครทำงานในสถานที่ที่ไม่มีความปลอดภัยเช่นนั้น"], correct: "ตัดสินใจว่าจะต้องมีเหตุผลอะไรที่นอกเหนือเงินขึ้นไป คุณจึงยอมสมัครทำงานในสถานที่ที่ไม่มีความปลอดภัยเช่นนั้น" },
	{ q: "ราวกั้นหรือรั้วกันตก (Guardrails) ต้องมีความสูงในช่วงใด", a: ["50-70 ซม.", "70-90 ซม.", "90-110 ซม.", "110-150 ซม."], correct: "90-110 ซม." },

	{ q: "ปัจจัยข้อใดไม่มีอิทธิพลต่อการเกิดโรคและการระบาดของโรคจากการทำงาน", a: ["สารเคมี", "สิ่งก่อโรค", "เครื่องจักร", "สิ่งแวดล้อม"], correct: "เครื่องจักร" },
    ];

    let quizData = [];
    let currentQ = 0;
    let userAnswers = [];

    // ฟังก์ชันสำหรับสุ่มอาเรย์ (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // เตรียมข้อสอบแบบสุ่ม
    function prepareQuiz() {
        // 1. สุ่มลำดับคำถาม
        quizData = shuffleArray([...rawData]);
        
        // 2. สุ่มตัวเลือกในแต่ละคำถาม
        quizData.forEach(item => {
            item.a = shuffleArray([...item.a]);
        });

        userAnswers = new Array(quizData.length).fill(null);
    }

    function checkDeadline() {
        const now = new Date();
        const deadline = new Date(`${DEADLINE_DATE}T${DEADLINE_TIME}:00`);
        if (now > deadline) {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('progress-wrapper').classList.add('hidden');
            document.getElementById('closed-step').classList.remove('hidden');
            document.getElementById('closed-detail').innerText = `ระบบได้ปิดรับคำตอบเมื่อวันที่ ${DEADLINE_DATE} เวลา ${DEADLINE_TIME} น.`;
            return true;
        }
        return false;
    }

    function updateProgressBar() {
        const progress = ((currentQ) / quizData.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function loadQuestion() {
        updateProgressBar();
        const qStep = document.getElementById('quiz-step');
        qStep.classList.remove('fade-in');
        void qStep.offsetWidth; 
        qStep.classList.add('fade-in');

        const q = quizData[currentQ];
        document.getElementById('q-title').innerText = `คำถามที่ ${currentQ + 1}/${quizData.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            if (userAnswers[currentQ] === index) btn.classList.add('selected');
            btn.onclick = () => selectAnswer(index);
            optionsDiv.appendChild(btn);
        });

        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        currentQ > 0 ? prevBtn.classList.remove('hidden') : prevBtn.classList.add('hidden');
        
        if (currentQ === quizData.length - 1) {
            nextBtn.innerText = "ส่งคำตอบ";
        } else {
            nextBtn.innerText = "ถัดไป →";
        }
    }

    function selectAnswer(index) {
        userAnswers[currentQ] = index;
        const btns = document.querySelectorAll('#q-options button');
        btns.forEach((b, i) => {
            if(i === index) b.classList.add('selected');
            else b.classList.remove('selected');
        });
        
        setTimeout(nextQuestion, 400); 
    }

    function nextQuestion() {
        if (userAnswers[currentQ] === null) {
            alert("กรุณาเลือกคำตอบก่อนไปข้อถัดไป");
            return;
        }

        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            loadQuestion();
        }
    }

    function calculateScore() {
        let score = 0;
        quizData.forEach((q, idx) => {
            const userChoiceIndex = userAnswers[idx];
            if (userChoiceIndex !== null) {
                const userChoiceText = q.a[userChoiceIndex];
                if (userChoiceText === q.correct) {
                    score++;
                }
            }
        });
        return score;
    }

    function showResult() {
        document.getElementById('progress-bar').style.width = `100%`;
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const score = calculateScore();
        const finalScore = Math.round((score / quizData.length) * 100);
        
        document.getElementById('score-display').innerText = `${finalScore}%`;
        document.getElementById('score-text').innerText = `คุณทำคะแนนได้ ${score} จาก ${quizData.length} คะแนน`;

        if(finalScore >= 70) {
            document.getElementById('pass-form').classList.remove('hidden');
        } else {
            document.getElementById('fail-msg').classList.remove('hidden');
        }
    }

    async function sendData() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        if(!name || !email) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

        const submitBtn = document.querySelector('.btn-submit');
        submitBtn.innerText = "กำลังส่งข้อมูล...";
        submitBtn.disabled = true;

        const payload = {
            name: name,
            email: email,
            score: Math.round((calculateScore() / quizData.length) * 100),
            status: "passed"
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว!");
            location.reload();
        } catch (error) {
            alert("เกิดข้อผิดพลาด แต่ระบบอาจจะบันทึกข้อมูลแล้ว โปรดตรวจสอบอีเมล");
            submitBtn.disabled = false;
            submitBtn.innerText = "ส่งข้อมูลรับเกียรติบัตร";
        }
    }

    // เริ่มต้นโปรแกรม
    if (!checkDeadline()) {
        prepareQuiz();
        loadQuestion();
    }
</script>

</body>
</html>
