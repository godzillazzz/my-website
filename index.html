<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz for Canva</title>
    <style>
        :root {
            --primary-color: #7d2ae8; /* Canva Purple */
            --secondary-color: #00c4cc; /* Canva Teal */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .options-container {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }

        button.option-btn {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        button.option-btn:hover {
            border-color: var(--primary-color);
            background: #f0e6ff;
        }

        button.option-btn.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #666;
            color: white;
            cursor: pointer;
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .submit-btn {
            background: var(--secondary-color);
        }

        /* Form Style */
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .hidden { display: none; }
        
        #result-area {
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-step">
        <div id="progress">ข้อที่ 1 / 3</div>
        <p class="question-text" id="question-display"></p>
        <div class="options-container" id="options-display"></div>
        
        <div class="nav-controls">
            <button class="nav-btn" id="prev-btn" onclick="changeQuestion(-1)">← ย้อนกลับ</button>
            <button class="nav-btn" id="next-btn" onclick="changeQuestion(1)">ถัดไป →</button>
        </div>
    </div>

    <div id="form-step" class="hidden">
        <h2>🎉 ยินดีด้วยคุณสอบผ่าน!</h2>
        <p>กรุณากรอกข้อมูลเพื่อรับเกียรติบัตร</p>
        <div class="form-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="user-name" placeholder="ภาษาไทย หรือ English">
        </div>
        <div class="form-group">
            <label>อีเมล</label>
            <input type="email" id="user-email" placeholder="example@email.com">
        </div>
        <button class="nav-btn submit-btn" style="width: 100%;" onclick="submitData()">ส่งข้อมูลรับเกียรติบัตร</button>
    </div>

    <div id="fail-step" class="hidden">
        <h2>❌ พยายามใหม่อีกครั้ง</h2>
        <p id="fail-message"></p>
        <button class="nav-btn" onclick="location.reload()">เริ่มทำใหม่</button>
    </div>
</div>

<script>
    // 1. ข้อมูลข้อสอบ
    const questions = [
        { q: "1 + 1 เท่ากับเท่าไร?", options: ["1", "2", "3", "4"], answer: 1 },
        { q: "สีประจำ Canva คือสีอะไร?", options: ["แดง", "เขียว", "ม่วง", "เหลือง"], answer: 2 },
        { q: "HTML ย่อมาจากอะไร?", options: ["Hyperlinks Tool", "Hyper Text Markup Language", "Home Tool Markup"], answer: 1 }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);

    // 2. แสดงผลคำถาม
    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `ข้อที่ ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-display').innerText = q.q;
        
        const optionsDiv = document.getElementById('options-display');
        optionsDiv.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = `option-btn ${userAnswers[currentIdx] === index ? 'selected' : ''}`;
            btn.innerText = opt;
            btn.onclick = () => selectOption(index);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = currentIdx === 0;
        document.getElementById('next-btn').innerText = currentIdx === questions.length - 1 ? 'ตรวจคำตอบ' : 'ถัดไป →';
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        renderQuestion();
    }

    function changeQuestion(step) {
        if (step === 1 && userAnswers[currentIdx] === null) {
            alert('กรุณาเลือกคำตอบก่อนไปข้อถัดไป');
            return;
        }
        
        if (currentIdx + step >= 0 && currentIdx + step < questions.length) {
            currentIdx += step;
            renderQuestion();
        } else if (currentIdx + step === questions.length) {
            calculateResult();
        }
    }

    // 3. คำนวณคะแนน
    let finalScore = 0;
    function calculateResult() {
        let correct = 0;
        userAnswers.forEach((ans, idx) => {
            if (ans === questions[idx].answer) correct++;
        });

        finalScore = Math.round((correct / questions.length) * 100);
        document.getElementById('quiz-step').classList.add('hidden');

        if (finalScore >= 70) {
            document.getElementById('form-step').classList.remove('hidden');
        } else {
            document.getElementById('fail-step').classList.remove('hidden');
            document.getElementById('fail-message').innerText = `คุณได้คะแนน ${finalScore}% (เกณฑ์ผ่านคือ 70%)`;
        }
    }

    // 4. ส่งข้อมูลไปยัง API
    async function submitData() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;

        if (!name || !email) {
            alert('กรุณากรอกข้อมูลให้ครบถ้วน');
            return;
        }

        const payload = {
            name: name,
            email: email,
            score: finalScore
        };

        try {
            const response = await fetch('https://godzillazzz.github.io/my-website/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // หมายเหตุ: เนื่องจาก URL ที่ให้มาเป็น GitHub Pages ซึ่งมักไม่รับ POST 
            // โค้ดนี้จะดักจับตามเงื่อนไขที่คุณแจ้งไว้ (ถ้า API ส่ง status: success กลับมา)
            const result = await response.json();
            
            if (result.status === 'success') {
                alert("ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว!");
            } else {
                // สำหรับทดสอบ: ถ้า API จริงยังไม่พร้อม แต่เราต้องการจำลองว่าส่งสำเร็จ
                console.log("Payload sent:", payload);
                alert("ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว! (Demo Mode)");
            }
        } catch (error) {
            console.error("Error:", error);
            // เพื่อการใช้งานจริงใน Canva หาก API ติด CORS ให้เช็คที่ฝั่ง Server ด้วยครับ
            alert("บันทึกข้อมูลเรียบร้อย (Simulation)");
        }
    }

    // เริ่มต้นหน้าแรก
    renderQuestion();
</script>

</body>
</html>
