<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบออนไลน์ระดับพรีเมียม</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-color: #00c4cc;
            --success-color: #28a745;
            --danger-color: #ff4d4d;
            --bg-color: #f0f2f5;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #e0e0ff 0%, #f0f2f5 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.95);
            width: 95%;
            max-width: 550px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        #progress-bar {
            height: 100%;
            background: var(--primary-gradient);
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        h2 { 
            font-weight: 600;
            margin-top: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .question { 
            font-size: 1.3rem; 
            margin-bottom: 25px; 
            line-height: 1.5;
        }

        .options { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        button {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Kanit';
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
        }

        button:hover {
            border-color: #764ba2;
            background: #f8faff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.1);
        }

        button.selected {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn-back { 
            border: none;
            background: #f0f0f0; 
            color: #666; 
            flex: 1; 
            text-align: center !important;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: 'Kanit';
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #764ba2; }

        .hidden { display: none !important; }

        .btn-submit {
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 100%;
            font-weight: 600;
            text-align: center !important;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .fade-in { animation: slideIn 0.4s ease-out; }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 20px auto;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="progress-wrapper">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="closed-step" class="hidden">
        <h2 style="background: none; -webkit-text-fill-color: var(--danger-color);">❌ ปิดรับคำตอบแล้ว</h2>
        <p id="closed-detail" style="font-size: 1.1rem;"></p>
    </div>

    <div id="quiz-content">
        <div id="quiz-step" class="fade-in">
            <h2 id="q-title">คำถาม</h2>
            <div class="question" id="q-text">กำลังโหลดคำถาม...</div>
            <div class="options" id="q-options"></div>
            
            <div class="nav-buttons">
                <button id="prev-btn" class="btn-back hidden" onclick="prevQuestion()">← ย้อนกลับ</button>
            </div>
        </div>

        <div id="result-step" class="hidden fade-in">
            <h2 id="result-header">ผลการทดสอบ</h2>
            <div class="score-circle" id="score-display">0%</div>
            <p id="score-text" style="font-size: 1.2rem; font-weight: 500;"></p>
            
            <div id="pass-form" class="hidden">
                <div style="background: #e8f5e9; padding: 15px; border-radius: 12px; margin-bottom: 20px; color: #2e7d32;">
                    🎉 ยินดีด้วยคุณสอบผ่าน! กรุณากรอกข้อมูลเพื่อรับเกียรติบัตร
                </div>
                <input type="text" id="user-name" placeholder="ชื่อ-นามสกุล (สำหรับพิมพ์บนเกียรติบัตร)" required>
                <input type="email" id="user-email" placeholder="อีเมลสำหรับจัดส่ง" required>
                <button class="btn-submit" onclick="sendData()">รับเกียรติบัตรทางอีเมล</button>
            </div>

            <div id="fail-msg" class="hidden">
                <p style="color: #666;">คะแนนของคุณยังไม่ถึงเกณฑ์ 70% <br>พยายามอีกนิดนะครับ!</p>
                <button class="btn-submit" onclick="location.reload()">ลองใหม่อีกครั้ง</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- ตั้งค่าเวลาปิดรับคำตอบ ---
    const DEADLINE_DATE = "2027-12-31"; 
    const DEADLINE_TIME = "16:30";      

    const API_URL = 'https://script.google.com/macros/s/AKfycbxWXTALSodZnCC0EceZNX7o5P3xb4RQdXM3mcDgeUlZU7KBRx0fO-TRPGouP0RgebC6/exec';
    
    const quizData = [
        { q: "1 + 1 เท่ากับเท่าไร?", a: ["2", "3", "4", "5"], correct: 0 },
        { q: "สีท้องฟ้าตอนกลางวันคือสีอะไร?", a: ["แดง", "เขียว", "ฟ้า", "เหลือง"], correct: 2 },
        { q: "HTML ย่อมาจากอะไร?", a: ["Hyper Text Markup Language", "High Tech Multi Language", "Home Tool Markup Language"], correct: 0 }
    ];

    let currentQ = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    function checkDeadline() {
        const now = new Date();
        const deadline = new Date(`${DEADLINE_DATE}T${DEADLINE_TIME}:00`);
        if (now > deadline) {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('progress-wrapper').classList.add('hidden');
            document.getElementById('closed-step').classList.remove('hidden');
            document.getElementById('closed-detail').innerText = `ระบบได้ปิดรับคำตอบเมื่อวันที่ ${DEADLINE_DATE} เวลา ${DEADLINE_TIME} น.`;
            return true;
        }
        return false;
    }

    function updateProgressBar() {
        const progress = ((currentQ) / quizData.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function loadQuestion() {
        updateProgressBar();
        const qStep = document.getElementById('quiz-step');
        qStep.classList.remove('fade-in');
        void qStep.offsetWidth; // Trigger reflow
        qStep.classList.add('fade-in');

        const q = quizData[currentQ];
        document.getElementById('q-title').innerText = `คำถามที่ ${currentQ + 1}/${quizData.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            if (userAnswers[currentQ] === index) btn.classList.add('selected');
            btn.onclick = () => selectAnswer(index);
            optionsDiv.appendChild(btn);
        });

        const prevBtn = document.getElementById('prev-btn');
        currentQ > 0 ? prevBtn.classList.remove('hidden') : prevBtn.classList.add('hidden');
    }

    function selectAnswer(index) {
        userAnswers[currentQ] = index;
        setTimeout(nextQuestion, 300); // ดีเลย์เล็กน้อยเพื่อให้เห็น Effect การเลือก
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            loadQuestion();
        }
    }

    function calculateScore() {
        return userAnswers.reduce((score, ans, idx) => ans === quizData[idx].correct ? score + 1 : score, 0);
    }

    function showResult() {
        document.getElementById('progress-bar').style.width = `100%`;
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const score = calculateScore();
        const finalScore = Math.round((score / quizData.length) * 100);
        
        document.getElementById('score-display').innerText = `${finalScore}%`;
        document.getElementById('score-text').innerText = `คุณทำคะแนนได้ ${score} จาก ${quizData.length} คะแนน`;

        if(finalScore >= 70) {
            document.getElementById('pass-form').classList.remove('hidden');
        } else {
            document.getElementById('fail-msg').classList.remove('hidden');
        }
    }

    async function sendData() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        if(!name || !email) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

        const submitBtn = document.querySelector('.btn-submit');
        submitBtn.innerText = "กำลังส่งข้อมูล...";
        submitBtn.disabled = true;

        const payload = {
            name: name,
            email: email,
            score: Math.round((calculateScore() / quizData.length) * 100),
            status: "passed"
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว!");
            location.reload();
        } catch (error) {
            alert("เกิดข้อผิดพลาด แต่ระบบอาจจะบันทึกข้อมูลแล้ว โปรดตรวจสอบอีเมล");
            submitBtn.disabled = false;
            submitBtn.innerText = "ส่งข้อมูลรับเกียรติบัตร";
        }
    }

    if (!checkDeadline()) {
        loadQuestion();
    }
</script>

</body>
</html>
