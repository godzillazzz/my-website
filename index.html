<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบออนไลน์</title>
    <style>
        :root {
            --primary-color: #7d2ae8;
            --secondary-color: #00c4cc;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Kanit', sans-serif, system-ui;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: var(--primary-color); }

        .question { font-size: 1.2rem; margin-bottom: 20px; font-weight: 500; }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: 2px solid var(--primary-color);
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary-color);
            color: white;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .hidden { display: none; }

        #result-area {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-submit {
            background: var(--secondary-color);
            color: white;
            border: none;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-step">
        <h2 id="q-title">คำถามที่ 1</h2>
        <div class="question" id="q-text">กำลังโหลดคำถาม...</div>
        <div class="options" id="q-options"></div>
    </div>

    <div id="result-step" class="hidden">
        <h2 id="score-text"></h2>
        <div id="pass-form" class="hidden">
            <p>ยินดีด้วยคุณสอบผ่าน! กรุณากรอกข้อมูลเพื่อรับเกียรติบัตร</p>
            <input type="text" id="user-name" placeholder="ชื่อ-นามสกุล" required>
            <input type="email" id="user-email" placeholder="อีเมลของคุณ" required>
            <button class="btn-submit" onclick="sendData()">ส่งข้อมูลรับเกียรติบัตร</button>
        </div>
        <div id="fail-msg" class="hidden">
            <p>เสียใจด้วย คะแนนของคุณไม่ถึง 70% ลองใหม่อีกครั้งนะครับ</p>
            <button onclick="location.reload()">ทำแบบทดสอบใหม่</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxWXTALSodZnCC0EceZNX7o5P3xb4RQdXM3mcDgeUlZU7KBRx0fO-TRPGouP0RgebC6/exec';
    
    const quizData = [
        { q: "1 + 1 เท่ากับเท่าไร?", a: ["2", "3", "4", "5"], correct: 0 },
        { q: "สีท้องฟ้าตอนกลางวันคือสีอะไร?", a: ["แดง", "เขียว", "ฟ้า", "เหลือง"], correct: 2 },
        { q: "HTML ย่อมาจากอะไร?", a: ["Hyper Text Markup Language", "High Tech Multi Language", "Home Tool Markup Language"], correct: 0 }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const q = quizData[currentQ];
        document.getElementById('q-title').innerText = `คำถามที่ ${currentQ + 1}/${quizData.length}`;
        document.getElementById('q-text').innerText = q.q;
        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(index) {
        if(index === quizData[currentQ].correct) score++;
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const finalScore = Math.round((score / quizData.length) * 100);
        document.getElementById('score-text').innerText = `คุณได้คะแนน ${finalScore}/100`;

        if(finalScore >= 70) {
            document.getElementById('pass-form').classList.remove('hidden');
        } else {
            document.getElementById('fail-msg').classList.remove('hidden');
        }
    }

    async function sendData() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        const finalScore = Math.round((score / quizData.length) * 100);

        // 1. ตรวจสอบว่ากรอกข้อมูลครบไหม
        if(!name || !email) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

        // 2. ตรวจสอบคะแนนอีกครั้ง (Double Check) 
        // หากคะแนนไม่ถึง 70 จะไม่ดำเนินการส่ง API และไม่นับเลขเกียรติบัตร
        if (finalScore < 70) {
            alert("ขออภัย คะแนนของคุณไม่ผ่านเกณฑ์ 70% จึงไม่สามารถออกเกียรติบัตรได้");
            location.reload();
            return;
        }

        const payload = {
            name: name,
            email: email,
            score: finalScore,
            status: "passed" // เพิ่มสถานะเข้าไปเพื่อให้ฝั่ง Google Script เช็คได้ง่ายขึ้น
        };

        try {
            // แสดงสถานะกำลังโหลด (Optional)
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.innerText = "กำลังส่งข้อมูล...";
            submitBtn.disabled = true;

            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', 
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            alert("ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว!");
            location.reload();
            
        } catch (error) {
            console.error('Error:', error);
            alert("เกิดข้อผิดพลาดในการส่งข้อมูล");
            submitBtn.disabled = false;
            submitBtn.innerText = "ส่งข้อมูลรับเกียรติบัตร";
        }
    }

    loadQuestion();
</script>

</body>
</html>
