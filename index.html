<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz for Canva</title>
    <style>
        :root {
            --primary-color: #7d2ae8;
            --secondary-color: #00c4cc;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .hidden { display: none; }

        h2 { color: var(--primary-color); }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background: #f0e6ff;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .submit-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .submit-btn:disabled { background-color: #ccc; }

        #message { margin-top: 15px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-screen">
        <h2>แบบทดสอบรับเกียรติบัตร</h2>
        <p>ตอบคำถามให้ถูกต้องเพื่อรับใบประกาศนียบัตร</p>
        <button class="submit-btn" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <h3 id="question-text">คำถามจะปรากฏที่นี่</h3>
        <div id="options-container"></div>
    </div>

    <div id="form-screen" class="hidden">
        <h2>ยินดีด้วย! คุณสอบผ่าน</h2>
        <p>กรุณากรอกข้อมูลเพื่อรับเกียรติบัตร</p>
        <p>คะแนนของคุณ: <span id="final-score"></span>/3</p>
        <input type="text" id="userName" placeholder="ชื่อ-นามสกุล" required>
        <input type="email" id="userEmail" placeholder="อีเมล" required>
        <button class="submit-btn" id="btnSend" onclick="sendData()">ส่งข้อมูลรับเกียรติบัตร</button>
        <div id="message"></div>
    </div>

    <div id="fail-screen" class="hidden">
        <h2>พยายามใหม่อีกครั้ง!</h2>
        <p>คุณได้คะแนนน้อยเกินไปสำหรับการรับเกียรติบัตร</p>
        <button class="submit-btn" onclick="location.reload()">ลองอีกครั้ง</button>
    </div>
</div>

<script>
    const questions = [
        { q: "HTML ย่อมาจากอะไร?", a: ["Hyperlinks and Text Markup Language", "Hyper Text Markup Language", "Home Tool Markup Language"], correct: 1 },
        { q: "CSS ใช้สำหรับทำอะไร?", a: ["จัดการโครงสร้างข้อมูล", "ประมวลผลเซิร์ฟเวอร์", "ตกแต่งรูปแบบหน้าเว็บ"], correct: 2 },
        { q: "คำสั่งใดใช้ประกาศตัวแปรใน JavaScript?", a: ["let", "define", "variable"], correct: 0 }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const qData = questions[currentQuestion];
        document.getElementById('question-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });
    }

    function checkAnswer(index) {
        if(index === questions[currentQuestion].correct) score++;
        
        currentQuestion++;
        if(currentQuestion < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        if(score >= 2) {
            document.getElementById('form-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        } else {
            document.getElementById('fail-screen').classList.remove('hidden');
        }
    }

    async function sendData() {
        const name = document.getElementById('userName').value;
        const email = document.getElementById('userEmail').value;
        const btnSend = document.getElementById('btnSend');
        const msg = document.getElementById('message');

        if(!name || !email) {
            alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            return;
        }

        btnSend.disabled = true;
        btnSend.innerText = "กำลังส่งข้อมูล...";

        const payload = {
            name: name,
            email: email,
            score: score
        };

        try {
            const response = await fetch('https://godzillazzz.github.io/my-website/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // หมายเหตุ: เนื่องจาก URL ปลายทางเป็น GitHub Pages (Static Site) 
            // ปกติจะ Return 405 Method Not Allowed หากไม่ใช่ API จริง
            // แต่ผมเขียน Logic ดักจับตามที่คุณต้องการไว้ดังนี้:
            
            const result = await response.json();
            if (result.status === 'success') {
                msg.innerText = "ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว!";
            } else {
                msg.style.color = "red";
                msg.innerText = "เกิดข้อผิดพลาดจากระบบ";
            }
        } catch (error) {
            // จำลองการทำงานหากติดต่อ API สำเร็จ (เพื่อการทดสอบ)
            console.log("Data sent:", payload);
            // msg.innerText = "ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว!"; 
        }
    }
</script>

</body>
</html>
