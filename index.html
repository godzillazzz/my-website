<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบออนไลน์ | Modern Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #06b6d4;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --white: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        #quiz-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 95%;
            max-width: 550px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            border-radius: 10px;
            width: 0%;
        }

        h2 { 
            color: var(--primary); 
            margin-top: 0;
            font-weight: 600;
        }

        .question { 
            font-size: 1.3rem; 
            margin-bottom: 25px; 
            line-height: 1.5;
            color: var(--text-main);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            font-family: 'Sarabun', sans-serif;
            position: relative;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #f5f3ff;
            transform: translateY(-2px);
        }

        .option-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        /* Navigation Buttons */
        .nav-controls {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: underline;
        }

        .btn-back:hover { color: var(--primary); }

        /* Form Styling */
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus, input[type="email"]:focus {
            border-color: var(--primary);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        .hidden { display: none; }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate { animation: slideIn 0.4s ease-out; }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="quiz-step" class="animate">
        <h2 id="q-title">คำถาม</h2>
        <div class="question" id="q-text">กำลังโหลดคำถาม...</div>
        <div class="options" id="q-options"></div>
        
        <div class="nav-controls">
            <button id="back-btn" class="btn-back hidden" onclick="prevQuestion()">← ย้อนกลับ</button>
            <span id="q-counter" style="color: var(--text-muted); font-size: 0.9rem;"></span>
        </div>
    </div>

    <div id="result-step" class="hidden animate">
        <div class="score-circle" id="score-val">0</div>
        <h2 id="score-text">สรุปผลคะแนน</h2>
        
        <div id="pass-form" class="hidden">
            <p style="color: var(--text-muted)">ยินดีด้วยคุณสอบผ่าน! กรุณากรอกข้อมูลเพื่อรับเกียรติบัตร</p>
            <input type="text" id="user-name" placeholder="ชื่อ-นามสกุล">
            <input type="email" id="user-email" placeholder="อีเมลของคุณ">
            <button class="btn-submit" onclick="sendData()">ส่งข้อมูลรับเกียรติบัตร</button>
        </div>

        <div id="fail-msg" class="hidden">
            <p style="color: var(--text-muted)">คะแนนของคุณยังไม่ถึงเกณฑ์ 70% พยายามอีกนิดนะ!</p>
            <button class="btn-submit" style="background: var(--text-main);" onclick="location.reload()">ลองใหม่อีกครั้ง</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxWXTALSodZnCC0EceZNX7o5P3xb4RQdXM3mcDgeUlZU7KBRx0fO-TRPGouP0RgebC6/exec';
    
    const quizData = [
        { q: "คุณเพิ่งเข้าทำงานวันแรกในโรงงาน หัวหน้าได้มอบหมายให้คุณทำงานเกี่ยวกับเครื่องจักร ซึ่งมีลักษณะคล้ายๆกับที่คุณเคยทำมาก่อน (สถานที่ทำงานเก่า) แต่คุณไม่แน่ใจว่าจะทำงานกับเครื่องจักรนั้นได้ หัวหน้างานเข้าใจว่าคุณมีประสบการณ์มากกว่าทีคุณมีจริงๆ ดังนั้นเขาจึงสั่งให้คุณเริ่มทำงานให้ดีที่สุดเท่าทีจะทำได้ แล้วเขาก็เดินจากไป คุณจะทำอย่างไร", a: ["เปิดสวิทซ์เริ่มเดินเครื่องจักร เพราะคุณทราบดีว่าคุณจะต้องคุ้นเคยกับเครื่องจักรตัวใหม่นี้ภายในไม่ช้า", "เรียกหัวหน้างานกลับมา และบอกเขาว่า คุณยังไม่ทราบวิธีการทำงานกับเครื่องจักรที่กำลังได้รับมอบหมายให้ทำ", "มองคนข้างๆที่ทำงานกับเครื่องจักรซึ่งมีลักษณะคล้ายกับเครื่องจักรของคุณแล้วพยายามทำตามเขา", "เดินตรวจสอบเครื่องจักรสังเกตปุ่มและสัญลักษณ์ และสุ่มกดไปเรื่อยๆว่าปุ่มไหน สัญลักษณ์ไหนคืออะไร"], correct: 1 },
        { q: "ตาม พ.ร.บ. ความปลอดภัยฯ พ.ศ. 2554 มาตรา 16 นายจ้างต้องจัดอบรมความปลอดภัยให้ลูกจ้างเมื่อใด ? ", a: ["เมื่อลูกจ้างร้องขอเท่านั้น", "ก่อนเริ่มงาน หรือเมื่อเปลี่ยนงาน/เปลี่ยนเครื่องจักร", "หลังจากทำงานครบ 1 ปี", "เฉพาะลูกจ้างที่มีความเสี่ยงสูงเท่านั้น"], correct: 1 },
        { q: "คำว่า "อุบัติเหตุ" (Accident) ตามนิยามในคู่มือหมายถึงอะไร ? ", a: ["เหตุการณ์ที่วางแผนไว้แล้ว", "เหตุการณ์ที่ไม่มีผู้ใดตั้งใจให้เกิด แต่มีผลเสียต่อชีวิตหรือทรัพย์สิน", "เหตุการณ์ที่เกือบจะเกิดอันตรายแต่ยังไม่เกิด", "เหตุการณ์ที่เกือบจะเกิดอันตรายแต่ยังไม่เกิด"], correct: 1 }
    ];

    let currentQ = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    function loadQuestion() {
        const q = quizData[currentQ];
        const stepContainer = document.getElementById('quiz-step');
        
        // Add animation class
        stepContainer.classList.remove('animate');
        void stepContainer.offsetWidth; // trigger reflow
        stepContainer.classList.add('animate');

        document.getElementById('q-title').innerText = `คำถามที่ ${currentQ + 1}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('q-counter').innerText = `${currentQ + 1} จาก ${quizData.length}`;
        
        // Update Progress Bar
        const progress = ((currentQ) / quizData.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
        
        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = `option-btn ${userAnswers[currentQ] === index ? 'selected' : ''}`;
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(index);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('back-btn').classList.toggle('hidden', currentQ === 0);
    }

    function selectAnswer(index) {
        userAnswers[currentQ] = index;
        
        // หน่วงเวลานิดนึงให้เห็นว่ากดเลือกแล้ว
        setTimeout(() => {
            currentQ++;
            if(currentQ < quizData.length) {
                loadQuestion();
            } else {
                calculateAndShowResult();
            }
        }, 300);
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            loadQuestion();
        }
    }

    function calculateAndShowResult() {
        let finalScoreValue = 0;
        userAnswers.forEach((answer, index) => {
            if(answer === quizData[index].correct) finalScoreValue++;
        });

        const scorePercentage = Math.round((finalScoreValue / quizData.length) * 100);
        document.getElementById('progress-bar').style.width = `100%`;
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        document.getElementById('score-val').innerText = `${scorePercentage}%`;

        if(scorePercentage >= 70) {
            document.getElementById('pass-form').classList.remove('hidden');
        } else {
            document.getElementById('fail-msg').classList.remove('hidden');
        }

        window.currentFinalScore = scorePercentage;
    }

    async function sendData() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        const btn = document.querySelector('.btn-submit');

        if(!name || !email) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

        btn.innerText = "กำลังส่งข้อมูล...";
        btn.disabled = true;

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name, email, score: window.currentFinalScore })
            });

            alert("เรียบร้อย! ระบบส่งเกียรติบัตรให้คุณแล้ว");
            location.reload();
        } catch (error) {
            alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้ง");
            btn.innerText = "ส่งข้อมูลรับเกียรติบัตร";
            btn.disabled = false;
        }
    }

    loadQuestion();
</script>

</body>
</html>
