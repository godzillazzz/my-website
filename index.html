<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Online Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        #quiz-container {
            background: var(--card-bg);
            width: 95%;
            max-width: 480px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Progress Bar */
        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #e5e7eb;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 0 2px 2px 0;
        }

        h2 { 
            color: var(--primary);
            font-weight: 600;
            margin-top: 0;
            font-size: 1.5rem;
        }

        .question { 
            font-size: 1.25rem; 
            margin-bottom: 25px; 
            line-height: 1.5;
            color: var(--text-main);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 16px 20px;
            border: 2px solid #f3f4f6;
            background: #f9fafb;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Kanit', sans-serif;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #eef2ff;
            transform: translateY(-2px);
        }

        .option-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
            border: none;
            flex: 1;
        }

        .btn-back {
            background: #f3f4f6;
            color: var(--text-muted);
        }

        .btn-back:hover { background: #e5e7eb; }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus, input[type="email"]:focus {
            border-color: var(--primary);
        }

        .btn-submit {
            background: var(--secondary);
            color: white;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .btn-submit:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .hidden { display: none; }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .fade-in { animation: slideIn 0.4s ease-out; }

        .score-circle {
            width: 100px;
            height: 100px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            border: 4px solid var(--primary);
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="quiz-step" class="fade-in">
        <h2 id="q-title">คำถามที่ 1</h2>
        <div class="question" id="q-text">กำลังโหลดคำถาม...</div>
        <div class="options" id="q-options"></div>
        
        <div class="nav-buttons">
            <button id="prev-btn" class="btn-action btn-back hidden" onclick="prevQuestion()">ย้อนกลับ</button>
        </div>
    </div>

    <div id="result-step" class="hidden fade-in" style="text-align: center;">
        <div class="score-circle" id="score-display">0</div>
        <h2 id="score-text"></h2>
        
        <div id="pass-form" class="hidden">
            <p style="color: var(--text-muted)">ยินดีด้วยคุณสอบผ่าน! กรุณากรอกข้อมูลเพื่อรับเกียรติบัตร</p>
            <input type="text" id="user-name" placeholder="ชื่อ-นามสกุล">
            <input type="email" id="user-email" placeholder="อีเมลของคุณ">
            <button class="btn-action btn-submit" onclick="sendData()">ส่งข้อมูลรับเกียรติบัตร</button>
        </div>

        <div id="fail-msg" class="hidden">
            <p style="color: var(--text-muted)">พยายามอีกนิด! คะแนนของคุณยังไม่ถึงเกณฑ์ 70%</p>
            <button class="btn-action btn-submit" onclick="location.reload()" style="background: var(--primary)">ลองใหม่อีกครั้ง</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxWXTALSodZnCC0EceZNX7o5P3xb4RQdXM3mcDgeUlZU7KBRx0fO-TRPGouP0RgebC6/exec';
    
    const quizData = [
        { q: "1 + 1 เท่ากับเท่าไร?", a: ["2", "3", "4", "5"], correct: 0 },
        { q: "สีท้องฟ้าตอนกลางวันคือสีอะไร?", a: ["แดง", "เขียว", "ฟ้า", "เหลือง"], correct: 2 },
        { q: "HTML ย่อมาจากอะไร?", a: ["Hyper Text Markup Language", "High Tech Multi Language", "Home Tool Markup Language"], correct: 0 }
    ];

    let currentQ = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    function loadQuestion() {
        const q = quizData[currentQ];
        const step = document.getElementById('quiz-step');
        
        // อัปเดต Progress Bar
        const progress = ((currentQ) / quizData.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;

        document.getElementById('q-title').innerText = `คำถามที่ ${currentQ + 1}/${quizData.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span style="margin-right:10px; opacity:0.5">${String.fromCharCode(65 + index)}.</span> ${opt}`;
            
            if (userAnswers[currentQ] === index) {
                btn.classList.add('selected');
            }

            btn.onclick = () => selectAnswer(index);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('prev-btn').classList.toggle('hidden', currentQ === 0);
    }

    function selectAnswer(index) {
        userAnswers[currentQ] = index;
        
        // เพิ่มลูกเล่นนิดหน่อยก่อนเปลี่ยนข้อ
        const btns = document.querySelectorAll('.option-btn');
        btns[index].classList.add('selected');
        
        setTimeout(() => {
            nextQuestion();
        }, 300);
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            loadQuestion();
        }
    }

    function calculateScore() {
        return userAnswers.reduce((score, ans, idx) => {
            return ans === quizData[idx].correct ? score + 1 : score;
        }, 0);
    }

    function showResult() {
        document.getElementById('progress-bar').style.width = `100%`;
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const score = calculateScore();
        const finalScore = Math.round((score / quizData.length) * 100);
        
        document.getElementById('score-display').innerText = finalScore;
        document.getElementById('score-text').innerText = `คุณทำได้ ${score} จาก ${quizData.length} ข้อ`;

        if(finalScore >= 70) {
            document.getElementById('pass-form').classList.remove('hidden');
        } else {
            document.getElementById('fail-msg').classList.remove('hidden');
        }
    }

    async function sendData() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        const score = calculateScore();
        const finalScore = Math.round((score / quizData.length) * 100);

        if(!name || !email) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

        const submitBtn = document.querySelector('.btn-submit');
        submitBtn.innerText = "กำลังส่งข้อมูล...";
        submitBtn.disabled = true;

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', 
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, score: finalScore, status: "passed" })
            });

            alert("ระบบส่งเกียรติบัตรเข้าอีเมลของคุณเรียบร้อยแล้ว!");
            location.reload();
        } catch (error) {
            alert("เกิดข้อผิดพลาด แต่เราได้รับข้อมูลของคุณแล้ว");
            submitBtn.disabled = false;
            submitBtn.innerText = "ส่งข้อมูลรับเกียรติบัตร";
        }
    }

    loadQuestion();
</script>

</body>
</html>
